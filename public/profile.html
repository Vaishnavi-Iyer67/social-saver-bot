<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Your Profile • Social Saver</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Theme Engine -->
<script src="/theme.js"></script>

<style>
.fade-in { animation: fadeIn .6s ease-out forwards; opacity: 0; }
@keyframes fadeIn { 
    from { opacity:0; transform: translateY(10px);} 
    to {opacity:1; transform: translateY(0);} 
}

/* Avatar hover */
.avatar:hover {
    transform: scale(1.03);
    transition: .2s ease;
}

/* Soft shadow */
.soft-card {
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}
</style>

</head>

<body class="bg-cream dark:bg-espresso text-mocha dark:text-cream min-h-screen">

<!-- NAVBAR -->
<div id="navbar-container"></div>
<script>
fetch("/navbar.html")
  .then(r => r.text())
  .then(h => document.getElementById("navbar-container").innerHTML = h);
</script>

<div class="max-w-3xl mx-auto px-6 fade-in mt-6">

    <h1 class="text-3xl font-semibold mb-6">Your Profile</h1>

    <!-- PROFILE CARD -->
    <div class="bg-white dark:bg-mocha rounded-2xl p-6 soft-card border border-cocoa/30 dark:border-mocha/60">

        <!-- Avatar -->
        <div class="flex justify-center mb-6">
            <label class="cursor-pointer">
                <img id="avatarPreview" 
                    src="/default-pfp.png" 
                    class="w-32 h-32 rounded-full object-cover avatar border-4 border-mint shadow-soft">

                <input type="file" id="avatarInput" accept="image/*" class="hidden">
            </label>
        </div>

        <!-- NAME -->
        <div class="mb-4">
            <label class="block mb-1 text-sm text-mocha/70 dark:text-cream/70">Full Name</label>
            <input id="nameInput" 
                class="w-full p-3 rounded-xl bg-cream/50 dark:bg-espresso/50 border border-cocoa/20 dark:border-mocha/50 outline-none"
                placeholder="Your name">
        </div>

        <!-- BIO -->
        <div class="mb-4">
            <label class="block mb-1 text-sm text-mocha/70 dark:text-cream/70">Bio</label>
            <textarea id="bioInput" rows="3"
                class="w-full p-3 rounded-xl bg-cream/50 dark:bg-espresso/50 border border-cocoa/20 dark:border-mocha/50 outline-none"
                placeholder="Something about you..."></textarea>
        </div>

        <!-- SAVE BUTTON -->
        <button id="saveBtn"
            class="bg-mint text-mocha font-semibold px-5 py-3 rounded-xl shadow-soft hover:opacity-90 transition w-full">
            Save Profile
        </button>
    </div>


    <!-- STATS CARD -->
    <div class="bg-white dark:bg-mocha rounded-2xl p-6 soft-card border border-cocoa/30 dark:border-mocha/60 mt-8">

        <h2 class="text-xl font-semibold mb-4">Your Activity</h2>

        <div id="statsBox" class="space-y-3">

            <div class="p-4 rounded-xl bg-cream dark:bg-espresso flex justify-between">
                <span>Total Saved Posts</span>
                <strong id="totalPosts">—</strong>
            </div>

            <div class="p-4 rounded-xl bg-cream dark:bg-espresso flex justify-between">
                <span>Favorite Category</span>
                <strong id="favCategory">—</strong>
            </div>

        </div>
    </div>

</div>


<script>
// ========== Avatar Preview ==========
document.getElementById("avatarInput").addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => document.getElementById("avatarPreview").src = e.target.result;
    reader.readAsDataURL(file);
});

// ========== Load Stats ==========
async function loadStats() {
    const phone = localStorage.getItem("userPhone");
    if (!phone) return;

    // total saved
    const res = await fetch(`/analytics/user/${phone}`);
    const data = await res.json();

    let total = 0;
    let favCat = null;

    data.forEach(row => {
        total += row.total_posts;
        if (!favCat) favCat = row.category;
    });

    document.getElementById("totalPosts").textContent = total || 0;
    document.getElementById("favCategory").textContent = favCat || "None yet";
}

// ========== Save Profile ==========
// (local-only mock for now — real backend version comes later)
document.getElementById("saveBtn").onclick = () => {
    localStorage.setItem("userName", document.getElementById("nameInput").value);
    localStorage.setItem("userBio", document.getElementById("bioInput").value);

    alert("Profile updated successfully!");
};

// ========== Load Profile Fields ==========
document.getElementById("nameInput").value = localStorage.getItem("userName") || "";
document.getElementById("bioInput").value = localStorage.getItem("userBio") || "";

// Avatar persists? (optional)
// For now, do nothing.

loadStats();
</script>

</body>
</html>

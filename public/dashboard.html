<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard • Social Saver</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Load Theme System -->
<script src="/theme.js"></script>

<!-- Fade + Lift Styles -->
<style>
.fade-in { animation: fadeIn 0.6s ease-out forwards; opacity:0; }
@keyframes fadeIn { from {opacity:0; transform:translateY(8px);} to {opacity:1; transform:translateY(0);} }

.lift:hover { transform: translateY(-6px); transition: .25s ease; }
</style>
</head>

<body class="bg-cream dark:bg-espresso text-mocha dark:text-cream min-h-screen">

<!-- NAVBAR -->
<div id="navbar-container"></div>
<script>
fetch("/navbar.html")
  .then(r => r.text())
  .then(h => document.getElementById("navbar-container").innerHTML = h);
</script>

<!-- MAIN CONTENT WRAPPER -->
<div class="max-w-6xl mx-auto px-6 fade-in">

    <!-- Header -->
    <h1 class="text-3xl font-semibold mt-6">Dashboard</h1>
    <p class="text-mocha/60 dark:text-cream/70 mb-6">Your saved world, beautifully organized.</p>

    <!-- Random Inspiration Card -->
    <div id="inspirationBox"
         class="mb-10 p-6 rounded-2xl bg-white dark:bg-mocha shadow-soft border border-cocoa/40 dark:border-mocha/60 lift">

        <div class="flex items-center justify-between">
            <h3 class="text-xl font-semibold">☕ Today’s Brew</h3>
            <button onclick="loadInspiration()"
                class="px-4 py-2 bg-mint text-mocha rounded-xl shadow-soft hover:shadow-hover">
                Refresh
            </button>
        </div>

        <p id="insp-summary" class="mt-3 hidden"></p>
        <a id="insp-url" href="#" class="text-cocoa dark:text-mint text-sm underline hidden" target="_blank"></a>
    </div>


    <!-- Category Cards Title -->
    <h2 class="text-2xl font-semibold mb-4">Your Categories</h2>

    <!-- Categories Grid -->
    <div id="catGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 mb-20"></div>

</div>

<script>
// ---------------- LOAD CATEGORY STATS ----------------
async function loadCategories() {
    const res = await fetch("/analytics/categories");
    const data = await res.json();

    const container = document.getElementById("catGrid");
    container.innerHTML = "";

    const icons = ["🍃", "📘", "📝", "✏️", "📎", "☕"];

    data.forEach((item, index) => {
        const icon = icons[index % icons.length];

        container.innerHTML += `
            <div class="p-6 bg-white dark:bg-mocha border border-cocoa/40 dark:border-mocha/60
                        rounded-2xl shadow-soft lift fade-in">
               
                <div class="text-4xl mb-2">${icon}</div>

                <h3 class="text-xl font-semibold">${item.category}</h3>
                <p class="text-mocha/60 dark:text-cream/70">${item.total_posts} saved posts</p>

                <div class="inline-block px-3 py-1 bg-mint text-mocha mt-4 rounded-full shadow-soft text-sm">
                    ${item.category}
                </div>
            </div>
        `;
    });
}

// ---------------- LOAD RANDOM INSPIRATION ----------------
async function loadInspiration() {
    const box = document.getElementById("inspirationBox");
    const summaryEl = document.getElementById("insp-summary");
    const urlEl = document.getElementById("insp-url");

    summaryEl.classList.add("hidden");
    urlEl.classList.add("hidden");
    summaryEl.innerText = "Loading...";

    const res = await fetch("/random-post");
    const data = await res.json();

    if (data.error) {
        summaryEl.innerText = "Save more posts to get inspiration!";
        summaryEl.classList.remove("hidden");
        return;
    }

    summaryEl.innerText = data.ai_summary;
    summaryEl.classList.remove("hidden");

    urlEl.href = data.original_url;
    urlEl.innerText = "Open Source Post";
    urlEl.classList.remove("hidden");
}

// INIT
loadCategories();
loadInspiration();
</script>

</body>
</html>

<label>Your WhatsApp Number</label>
<input type="text" id="phone" placeholder="+91 9876543210">

<button onclick="accessBot()">Access the Bot</button>

<script>
async function accessBot() {
    const phone = document.getElementById("phone").value.trim();
    if (!phone) {
        alert("Enter your number");
        return;
    }

    // 1️⃣ LOGIN (BACKEND)
    const res = await fetch("/login-request", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone })
    });
    const data = await res.json();

    // 2️⃣ OPEN DASHBOARD
    window.location.href = data.loginLink;

    // 3️⃣ OPEN WHATSAPP CHAT (user's own account)
    const bot = "14155238886";
    const code = "join year-rest";
    window.open(`https://wa.me/${bot}?text=${encodeURIComponent(code)}`);
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>All Posts • Social Saver</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Theme Engine -->
<script src="/theme.js"></script>

<style>
/* Smooth fade */
.fade-in { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
@keyframes fadeIn { 
    from { opacity:0; transform: translateY(8px);} 
    to { opacity:1; transform:translateY(0);} 
}

/* Masonry grid columns */
.masonry {
    column-count: 1;
    column-gap: 1.5rem;
}
@media (min-width: 640px) { .masonry { column-count: 2; } }
@media (min-width: 1024px) { .masonry { column-count: 3; } }

/* Masonry items */
.masonry-item { 
    break-inside: avoid;
    margin-bottom: 1.5rem;
}

.lift:hover { transform: translateY(-6px); transition: .25s ease; }
</style>

</head>

<body class="bg-cream dark:bg-espresso text-mocha dark:text-cream min-h-screen">

<!-- NAVBAR -->
<div id="navbar-container"></div>
<script>
fetch("/navbar.html")
  .then(r => r.text())
  .then(h => document.getElementById("navbar-container").innerHTML = h);
</script>

<!-- MAIN WRAPPER -->
<div class="max-w-6xl mx-auto px-6 fade-in">

    <h1 class="text-3xl font-semibold mt-6 mb-4">All Saved Posts</h1>
    <p class="text-mocha/60 dark:text-cream/70 mb-8">
        All your saved gems, beautifully arranged.
    </p>

    <!-- Masonry Container -->
    <div id="postsContainer" class="masonry"></div>

</div>



<script>
// =============== Utility: detect IG reel ===============
function getInstagramEmbed(url) {
    if (!url.includes("instagram.com")) return "";

    return `
        <blockquote class="instagram-media" 
            data-instgrm-permalink="${url}" 
            data-instgrm-version="14"></blockquote>
    `;
}


// =============== Load Posts ===============
async function loadPosts() {
    const res = await fetch("/posts/all");
    const posts = await res.json();

    const container = document.getElementById("postsContainer");
    container.innerHTML = "";

    posts.forEach(p => {
        const isIG = p.original_url.includes("instagram.com");

        container.innerHTML += `
        <div class="masonry-item fade-in">

            <div class="p-4 bg-white dark:bg-mocha 
                        rounded-2xl shadow-soft border border-cocoa/40 dark:border-mocha/60 lift">

                <!-- Category Label -->
                <div class="inline-block px-3 py-1 bg-mint text-mocha rounded-full text-sm shadow-soft mb-3">
                    ${p.category} • ${p.label}
                </div>

                <!-- Instagram Embed OR Link Preview -->
                <div class="mb-3">
                    ${isIG ? getInstagramEmbed(p.original_url)
                           : `<a class="underline text-cocoa dark:text-mint" href="${p.original_url}" target="_blank">Open Original Post</a>`}
                </div>

                <!-- Summary -->
                <p class="text-mocha/80 dark:text-cream/80 text-sm">
                    ${p.ai_summary}
                </p>

                <!-- Created At -->
                <p class="text-xs text-mocha/50 mt-3 dark:text-cream/50">
                    Saved on ${new Date(p.created_at).toLocaleDateString()}
                </p>
            </div>

        </div>
        `;
    });

    // Load IG JS
    const ig = document.createElement("script");
    ig.src = "https://www.instagram.com/embed.js";
    document.body.appendChild(ig);
}

loadPosts();
</script>

</body>
</html>
